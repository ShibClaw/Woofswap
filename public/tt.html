    // Gate Layer 网络配置
    const chains = {
        GateLayer: {
            chainId: 10088,
            chainName: 'Gate Layer',
            rpcUrl: 'https://gatelayer-mainnet.gatenode.cc',

    };

    let web3, account, x402Contract, testAccount=1,testAddress='0x554a5321057579F85e04C15E21cB2498C26da3f4';

    async function waitForTransaction(txHash) {
        let receipt = null;
        const maxAttempts = 30;
        let attempts = 0;
        while (attempts < maxAttempts) {
            receipt = await web3.eth.getTransactionReceipt(txHash);
            if (receipt) {
                if (receipt.status) return receipt;
                throw new Error(`交易 ${txHash} 失败`);
            }
            await new Promise(resolve => setTimeout(resolve, 2000));
            attempts++;
        }
        throw new Error(`交易 ${txHash} 未在 ${maxAttempts} 次尝试后确认`);
    }

    async function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function retryContractCall(fn, maxRetries = 3, delayMs = 3000) {
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                return await Promise.race([
                    fn(),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('查询超时')), 15000))
                ]);
            } catch (error) {
                console.error(`尝试 ${attempt}/${maxRetries} 失败: ${error.message}`);
                if (attempt === maxRetries) throw error;
                await delay(delayMs);
            }
        }
    }

    async function initializeWeb3() {
        if (!window.ethereum) {
            document.getElementById('networkStatus').innerText = '请安装 MetaMask';
            return;
        }
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (!accounts || accounts.length === 0) {
                throw new Error('未获取到账户，请确保 MetaMask 已授权');
            }
            account = accounts[0];
            document.getElementById('connectWalletButton').innerText = `已连接: ${account.slice(0, 6)}...${account.slice(-4)}`;
            await switchNetwork('GateLayer');
            x402Contract = new web3.eth.Contract(x402ContractAbi, X402_CONTRACT_ADDRESS);
            // 初始化测试账户
            try {
                // testAccount = web3.eth.accounts.privateKeyToAccount(TEST_PRIVATE_KEY);
                // web3.eth.accounts.wallet.add(testAccount);
                // console.log('测试账户地址:', testAccount.address);
            } catch (error) {
                throw new Error(`测试账户初始化失败: ${error.message}`);
            }
            await checkBalances();
            autoFillTime();
            document.getElementById('networkStatus').innerText = '已连接到 Gate Layer (ID: 10088)';
        } catch (error) {
            document.getElementById('networkStatus').innerText = `钱包连接失败: ${error.message || '未知错误'}`;
            console.error('初始化错误:', error);
        }
    }

    async function switchNetwork(chain) {
        const chainConfig = chains[chain];
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: `0x${chainConfig.chainId.toString(16)}` }]
            });
        } catch (switchError) {
            if (switchError.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: `0x${chainConfig.chainId.toString(16)}`,
                        chainName: chainConfig.chainName,
                        rpcUrls: [chainConfig.rpcUrl],
                        nativeCurrency: chainConfig.nativeCurrency,
                        blockExplorerUrls: [chainConfig.blockExplorer]
                    }]
                });
            } else {
                throw switchError;
            }
        }
    }

    async function checkBalances() {
        if (!web3 || !account || !testAccount) {
            document.getElementById('balanceStatus').innerHTML = 'GT余额: 0<br>Ging余额: 0<br>测试账户GT余额: 0';
            return;
        }
        try {
            document.getElementById('networkStatus').innerText = '查询余额...';
            const gtBalance = await retryContractCall(() => web3.eth.getBalance(account));
            const gingBalance = await retryContractCall(() => x402Contract.methods.balanceOf(account).call());
            const testGtBalance = await retryContractCall(() => web3.eth.getBalance(testAddress));
            const gtBalanceFormatted = Number(web3.utils.fromWei(gtBalance, 'ether')).toFixed(4);
            const gingBalanceFormatted = Number(web3.utils.fromWei(gingBalance, 'ether')).toFixed(4);
            const testGtBalanceFormatted = Number(web3.utils.fromWei(testGtBalance, 'ether')).toFixed(4);
            document.getElementById('balanceStatus').innerHTML = `GT余额: ${gtBalanceFormatted}<br>Ging余额: ${gingBalanceFormatted}<br>测试账户GT余额: ${testGtBalanceFormatted}`;
            document.getElementById('networkStatus').innerText = '余额已更新';
        } catch (error) {
            document.getElementById('networkStatus').innerText = `查询余额失败: ${error.message || '未知错误'}`;
            console.error('余额查询错误:', error);
        }
    }

    function autoFillTime() {
        const now = new Date();
        const validAfter = new Date(now.getTime());
        const validBefore = new Date(now.getTime() + 3600 * 1000); // 1 小时后

        const formatDate = (date) => {
            const pad = (num) => String(num).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        };

        document.getElementById('validAfter').value = formatDate(validAfter);
        document.getElementById('validBefore').value = formatDate(validBefore);
        document.getElementById('transferStatus').innerText = '已自动填充时间：当前时间和 1 小时后';
    }

    async function generateNonce() {
        const nonce = web3.utils.randomHex(32);
        document.getElementById('nonce').value = nonce;
        document.getElementById('transferStatus').innerText = '已生成随机 nonce';
    }

    async function signTransfer() {
        if (!web3 || !account) {
            document.getElementById('transferStatus').innerText = '请先连接钱包';
            console.error('错误: 未连接钱包，account 未定义');
            return;
        }

        const transferTo = document.getElementById('transferTo').value;
        const transferAmount = document.getElementById('transferAmount').value;
        const validAfterInput = document.getElementById('validAfter').value;
        const validBeforeInput = document.getElementById('validBefore').value;
        const nonce = document.getElementById('nonce').value;
        const status = document.getElementById('transferStatus');
        const signButton = document.getElementById('signTransferButton');
        const executeButton = document.getElementById('executeTransferButton');

        if (!web3.utils.isAddress(transferTo)) {
            status.innerText = '无效的接收者地址';
            console.error('错误: 无效的接收者地址:', transferTo);
            return;
        }

        if (!transferAmount || isNaN(transferAmount) || Number(transferAmount) <= 0) {
            status.innerText = '请输入有效的转账金额（支持 18 位小数）';
            console.error('错误: 无效的转账金额:', transferAmount);
            return;
        }

        const validAfter = Math.floor(new Date(validAfterInput).getTime() / 1000);
        const validBefore = Math.floor(new Date(validBeforeInput).getTime() / 1000);
        const now = Math.floor(Date.now() / 1000);

        if (!validAfter || !validBefore || validAfter >= validBefore || validAfter < now - 60) {
            status.innerText = '无效的时间窗口：开始时间必须晚于当前时间且早于截止时间';
            console.error('错误: 无效的时间窗口', { validAfter, validBefore, now });
            return;
        }

        if (!nonce || !web3.utils.isHexStrict(nonce)) {
            status.innerText = '请输入有效的 nonce (如 0x123...)';
            console.error('错误: 无效的 nonce:', nonce);
            return;
        }

        try {
            signButton.disabled = true;
            signButton.innerHTML = '签名中... <i class="fa fa-spinner fa-spin ml-2"></i>';
            status.innerText = '正在生成签名...';

            const amountWei = web3.utils.toWei(transferAmount, 'ether'); // 支持 18 位小数
            const typedData = {
                types: {
                    EIP712Domain: [
                        { name: 'name', type: 'string' },
                        { name: 'version', type: 'string' },
                        { name: 'chainId', type: 'uint256' },
                        { name: 'verifyingContract', type: 'address' }
                    ],
                    TransferWithAuthorization: [
                        { name: 'from', type: 'address' },
                        { name: 'to', type: 'address' },
                        { name: 'value', type: 'uint256' },
                        { name: 'validAfter', type: 'uint256' },
                        { name: 'validBefore', type: 'uint256' },
                        { name: 'nonce', type: 'bytes32' }
                    ]
                },
                domain: {
                    name: 'Ging',
                    version: '1',
                    chainId: 10088, // Gate Layer chainId
                    verifyingContract: X402_CONTRACT_ADDRESS
                },
                primaryType: 'TransferWithAuthorization',
                message: {
                    from: account,
                    to: transferTo,
                    value: amountWei,
                    validAfter: validAfter,
                    validBefore: validBefore,
                    nonce: nonce
                }
            };

            console.log('签名数据:', JSON.stringify(typedData, null, 2));
            const signature = await window.ethereum.request({
                method: 'eth_signTypedData_v4',
                params: [account, JSON.stringify(typedData)]
            });
            console.log('签名:', signature);

            // 手动拆分签名
            const r = '0x' + signature.slice(2, 66);
            const s = '0x' + signature.slice(66, 130);
            const v = parseInt(signature.slice(130, 132), 16);
            console.log('签名拆分:', { v, r, s });

            status.innerText = '签名生成成功！可执行转账';
            executeButton.disabled = false;
            executeButton.dataset.signature = JSON.stringify({
                v,
                r,
                s,
                from: account,
                to: transferTo,
                value: amountWei,
                validAfter,
                validBefore,
                nonce
            });
            console.log('存储的签名数据:', executeButton.dataset.signature);
        } catch (error) {
            status.innerText = `签名失败: ${error.message || '未知错误'}`;
            console.error('签名错误:', error);
        } finally {
            signButton.disabled = false;
            signButton.innerHTML = '生成签名';
        }
    }

    async function executeTransfer() {
        if (!web3 || !testAccount) {
            document.getElementById('transferStatus').innerText = '请连接钱包并初始化测试账户';
            console.error('错误: 未初始化 web3 或 testAccount');
            return;
        }

        const status = document.getElementById('transferStatus');
        const executeButton = document.getElementById('executeTransferButton');
        let signatureData;
        try {
            signatureData = JSON.parse(executeButton.dataset.signature);
        } catch (error) {
            status.innerText = '签名数据无效，请重新生成签名';
            console.error('错误: 无法解析签名数据:', error);
            return;
        }

        const { v, r, s, from, to, value, validAfter, validBefore, nonce } = signatureData;
        console.log('执行转账参数:', { v, r, s, from, to, value, validAfter, validBefore, nonce });

        try {
            executeButton.disabled = true;
            executeButton.innerHTML = '转账中... <i class="fa fa-spinner fa-spin ml-2"></i>';
            status.innerText = '检查燃气费和余额...';

            const balance = await retryContractCall(() => x402Contract.methods.balanceOf(from).call());
            if (web3.utils.toBN(balance).lt(web3.utils.toBN(value))) {
                status.innerText = 'Ging 余额不足';
                console.error('错误: Ging 余额不足', { balance, value });
                return;
            }

            const gasPrice = await retryContractCall(() => web3.eth.getGasPrice());
            let estimatedGas;
            try {
                estimatedGas = await x402Contract.methods.transferWithAuthorization(
                    from,
                    to,
                    value,
                    validAfter,
                    validBefore,
                    nonce,
                    v,
                    r,
                    s
                ).estimateGas({ from: testAddress });
            } catch (error) {
                status.innerText = `Gas 估算失败: ${error.message || '未知错误'}`;
                console.error('Gas 估算错误:', error);
                return;
            }

            const nativeBalance = await retryContractCall(() => web3.eth.getBalance(testAddress));
            const gasCost = web3.utils.toBN(gasPrice).mul(web3.utils.toBN(estimatedGas));
            if (web3.utils.toBN(nativeBalance).lt(gasCost)) {
                status.innerText = '测试账户 GT 余额不足以支付燃气费';
                console.error('错误: 测试账户 GT 余额不足', { nativeBalance, gasCost });
                return;
            }

            const tx = await x402Contract.methods.transferWithAuthorization(
                from,
                to,
                value,
                validAfter,
                validBefore,
                nonce,
                v,
                r,
                s
            ).send({
                from: testAddress,
                gas: web3.utils.toHex(Math.min(estimatedGas * 2, 3000000)),
                gasPrice: gasPrice
            });

            console.log('交易发送成功:', tx);
            await waitForTransaction(tx.transactionHash);
            status.innerText = '转账成功！';
            await checkBalances();
        } catch (error) {
            status.innerText = `转账失败: ${error.message || '未知错误'}`;
            console.error('转账错误:', error);
        } finally {
            executeButton.disabled = true;
            executeButton.innerHTML = '执行转账';
        }
    }

    function copyContractAddress() {
        navigator.clipboard.writeText(X402_CONTRACT_ADDRESS).then(() => {
            const notification = document.createElement('div');
            notification.className = 'fixed bottom-4 right-4 bg-primary text-white px-4 py-2 rounded-lg shadow-lg z-50';
            notification.textContent = 'Ging 合约地址已复制！';
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.3s';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 2000);
        });
    }

    function autoFillTime() {
        const now = new Date();
        const validAfter = new Date(now.getTime());
        const validBefore = new Date(now.getTime() + 3600 * 1000); // 1 小时后

        const formatDate = (date) => {
            const pad = (num) => String(num).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        };

        document.getElementById('validAfter').value = formatDate(validAfter);
        document.getElementById('validBefore').value = formatDate(validBefore);
        document.getElementById('transferStatus').innerText = '已自动填充时间：当前时间和 1 小时后';
    }

    async function generateNonce() {
        const nonce = web3.utils.randomHex(32);
        document.getElementById('nonce').value = nonce;
        document.getElementById('transferStatus').innerText = '已生成随机 nonce';
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('connectWalletButton').addEventListener('click', initializeWeb3);
        document.getElementById('generateNonceButton').addEventListener('click', generateNonce);
        document.getElementById('signTransferButton').addEventListener('click', signTransfer);
        document.getElementById('executeTransferButton').addEventListener('click', executeTransfer);
        document.getElementById('autoFillTimeButton').addEventListener('click', autoFillTime);

        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            menuToggle.innerHTML = mobileMenu.classList.contains('hidden')
                ? '<i class="fa fa-bars"></i>'
                : '<i class="fa fa-times"></i>';
        });

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                mobileMenu.classList.add('hidden');
                menuToggle.innerHTML = '<i class="fa fa-bars"></i>';
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('bg-dark/95', 'shadow-lg');
            } else {
                navbar.classList.remove('bg-dark/95', 'shadow-lg');
            }
        });
    });
</script>
</body>
